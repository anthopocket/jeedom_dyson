<div class="form-group">
    <label class="col-sm-4 control-label">{{Identifiant logique}}</label>
    <div class="col-sm-8">
        <input type="text" class="cmdAttr form-control" data-l1key="logicalId" readonly />
    </div>
</div>
<div class="form-group">
    <label class="col-sm-4 control-label">{{Valeur minimale}}</label>
    <div class="col-sm-8">
        <input type="number" class="cmdAttr form-control" data-l1key="configuration" data-l2key="minValue" />
    </div>
</div>
<div class="form-group">
    <label class="col-sm-4 control-label">{{Valeur maximale}}</label>
    <div class="col-sm-8">
        <input type="number" class="cmdAttr form-control" data-l1key="configuration" data-l2key="maxValue" />
    </div>
</div>
<div class="form-group">
    <label class="col-sm-4 control-label">{{Répéter les valeurs identiques}}</label>
    <div class="col-sm-8">
        <input type="checkbox" class="cmdAttr" data-l1key="configuration" data-l2key="repeatEventIfOk" />
    </div>
</div>
